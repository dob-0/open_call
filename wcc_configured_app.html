// --- GEOMETRY FACTORIES ---
const createArchGeo = (type) => {
  if (type === 'none') return new THREE.BoxGeometry(0,0,0);
  switch(type) {
    case 'torus_full': return new THREE.TorusGeometry(2.4, 0.35, 32, 100);
    case 'cylinder': return new THREE.CylinderGeometry(2.4, 2.4, 0.7, 64);
    case 'box': return new THREE.BoxGeometry(4.8, 0.7, 4.8);
    case 'wireframe_torus': return new THREE.TorusGeometry(3, 0.4, 16, 64);
    case 'torus_half': default: return new THREE.TorusGeometry(2.4, 0.35, 32, 100, Math.PI * 1.5);
  }
};
const createCoreGeo = (type) => {
  if (type === 'none') return new THREE.BoxGeometry(0,0,0);
  switch(type) {
    case 'box': return new THREE.BoxGeometry(1.8, 1.8, 1.8);
    case 'icosahedron': return new THREE.IcosahedronGeometry(1.2, 0);
    case 'sphere': default: return new THREE.SphereGeometry(1.2, 64, 64);
  }
};
const createRingGeo = (type, radius) => {
  const thick = 0.02;
  if (type === 'none') return new THREE.BoxGeometry(0,0,0);
  switch(type) {
    case 'thick': return new THREE.TorusGeometry(radius, 0.08, 16, 100);
    case 'square': return new THREE.TorusGeometry(radius, 0.06, 4, 100);
    case 'orbit_rings': return new THREE.TorusGeometry(radius, 0.005, 8, 100);
    case 'thin': default: return new THREE.TorusGeometry(radius, thick, 16, 100);
  }
};

function App() {
  const mountRef = useRef(null);
  const sceneRefs = useRef({});

  // UX State
  const [layer, setLayer] = useState(0);
  const [isEditorOpen, setIsEditorOpen] = useState(false);
  const [showSettingsBtn, setShowSettingsBtn] = useState(false);
  const [activeEditorMenu, setActiveEditorMenu] = useState('main');
  const [exportedImage, setExportedImage] = useState(null);
  const [isSaved, setIsSaved] = useState(false);

  // Sync active menu to ref for the animate loop to read
  useEffect(() => {
    if (sceneRefs.current) {
        sceneRefs.current.activeMenu = activeEditorMenu;
    }
  }, [activeEditorMenu]);

  // Form State
  const [formAnswers, setFormAnswers] = useState({});
  const [formStatus, setFormStatus] = useState('idle');
  const [submissions, setSubmissions] = useState(() => {
    try { const saved = localStorage.getItem('wcc_app_submissions_unified'); return saved ? JSON.parse(saved) : []; } catch(e) { return []; }
  });

  // Media & Mapper States
  const [isRecording, setIsRecording] = useState(false);
  const [tempMediaUrl, setTempMediaUrl] = useState('');
  const [prefillUrl, setPrefillUrl] = useState('');
  const [isMappingLoading, setIsMappingLoading] = useState(false);

  // REFS
  const targetArtPosRef = useRef({ x: 0, y: 0.5, z: 8.0 });
  const isRecordingRef = useRef(false);
  const originalRendererStateRef = useRef(null);
  const mediaRecorderRef = useRef(null);
  const chunksRef = useRef([]);
  const recCanvasRef = useRef(null);
  const recCtxRef = useRef(null);
  const secretClickRef = useRef({ count: 0, timer: null });

  const [settings, setSettings] = useState(() => {
    try {
        const saved = localStorage.getItem('wcc_app_settings_unified');
        if (saved) {
            const parsed = JSON.parse(saved);
            if (parsed.mediaUrl && !parsed.mediaGallery) parsed.mediaGallery = [parsed.mediaUrl];
            if (!parsed.mediaGallery) parsed.mediaGallery = [];
            
            // Force remove the unsplash placeholder if it's cached in local storage
            if (parsed.mediaGallery[0] && parsed.mediaGallery[0].includes('unsplash.com')) {
                parsed.mediaGallery[0] = 'https://lh3.googleusercontent.com/d/12eRDfhxcSlHPO5STUEe1sGw7lD7T31JL';
            }
            
            return { ...DEFAULT_SETTINGS, ...parsed };
        }
    } catch (e) {}
    return DEFAULT_SETTINGS;
  });

  const settingsRef = useRef(settings);
  settingsRef.current = settings;

  // ---------------------------------------------------------
  // CORE HANDLERS
  // ---------------------------------------------------------
  const handleSettingChange = (key, value) => setSettings(prev => ({ ...prev, [key]: value }));

  const handleSaveSettings = () => {
    try {
        localStorage.setItem('wcc_app_settings_unified', JSON.stringify(settings));
        setIsSaved(true);
        setTimeout(() => setIsSaved(false), 2000);
    } catch (e) {
        alert("Cannot save to localStorage. Images are too large.");
    }
  };

  const handleDownloadImage = () => { if (!exportedImage) return; const a = document.createElement('a'); a.download = 'art_capture.png'; a.href = exportedImage; a.click(); };

  const handleImageUpload = async (e) => {
    const files = Array.from(e.target.files);
    if (files.length === 0) return;
    const readPromises = files.map(file => {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (ev) => resolve(ev.target.result);
            reader.readAsDataURL(file);
        });
    });
    const results = await Promise.all(readPromises);
    setSettings(prev => ({ ...prev, mediaGallery: [...(prev.mediaGallery || []), ...results] }));
    e.target.value = null;
  };

  const handleAddExternalUrl = () => {
    let rawUrl = tempMediaUrl.trim();
    if(!rawUrl) return;

    // Auto-convert Google Drive sharing links to direct image links suitable for WebGL
    const driveMatch = rawUrl.match(/\/file\/d\/([a-zA-Z0-9_-]+)/) || rawUrl.match(/id=([a-zA-Z0-9_-]+)/);
    if (driveMatch && driveMatch[1]) {
        rawUrl = `https://lh3.googleusercontent.com/d/${driveMatch[1]}`;
    }

    setSettings(prev => ({ ...prev, mediaGallery: [...(prev.mediaGallery || []), rawUrl] }));
    setTempMediaUrl('');
  };

  const handleRemoveMedia = (index) => {
    const newGallery = [...settings.mediaGallery];
    newGallery.splice(index, 1);
    handleSettingChange('mediaGallery', newGallery);
  };

  // --- FORM LOGIC ---
  const handleFormSubmit = () => {
    for (const q of settings.questions) {
        if (q.required) {
            const val = formAnswers[q.id];
            if (!val || (Array.isArray(val) && val.length === 0) || (typeof val === 'string' && val.trim() === '')) {
                alert(`Please answer the required question: [ ${q.label} ]`);
                return;
            }
        }
    }
    setFormStatus('submitting');
    const newSubmission = { date: new Date().toISOString(), ...formAnswers };
    const updatedSubmissions = [...submissions, newSubmission];
    setSubmissions(updatedSubmissions);
    try { localStorage.setItem('wcc_app_submissions_unified', JSON.stringify(updatedSubmissions)); } catch(e) {}

    if (settings.webhookUrl) {
        const iframeName = 'hidden_iframe_' + Date.now();
        const iframe = document.createElement('iframe');
        iframe.name = iframeName; iframe.style.display = 'none';
        document.body.appendChild(iframe);
        const form = document.createElement('form');
        form.method = 'POST'; form.action = settings.webhookUrl; form.target = iframeName;
        settings.questions.forEach(q => {
            const val = formAnswers[q.id];
            if (Array.isArray(val)) {
                val.forEach(v => {
                    const input = document.createElement('input');
                    input.type = 'hidden'; input.name = q.googleId; input.value = v; form.appendChild(input);
                });
            } else {
                const input = document.createElement('input');
                input.type = 'hidden'; input.name = q.googleId; input.value = val || ""; form.appendChild(input);
            }
        });
        document.body.appendChild(form); form.submit();
        setTimeout(() => { document.body.removeChild(form); setTimeout(() => document.body.removeChild(iframe), 2000); }, 100);
    }
    setTimeout(() => setFormStatus('success'), 1200);
  };

  const handleDownloadSubmissions = () => {
     if (submissions.length === 0) return alert("No submissions to download yet.");
     const headers = ['Date', ...settings.questions.map(q => q.label)];
     const csvRows = [headers.join(',')];
     submissions.forEach(sub => {
         const row = [sub.date];
         settings.questions.forEach(q => {
             let val = sub[q.id] || "";
             if (Array.isArray(val)) val = val.join('; ');

          let extractedData = ""; let base = "";

              let urlObj = new URL(inputRaw);
              base = urlObj.origin + urlObj.pathname;
              base = base.replace('viewform', 'formResponse').replace('prefill', 'formResponse');
              let html = ""; let fetchSuccess = false;
              const proxyList = [
                  { name: 'AllOrigins', url: `https://api.allorigins.win/raw?url=${encodeURIComponent(urlObj.href)}`, type: 'text' },
                  { name: 'CorsProxy', url: `https://corsproxy.io/?${encodeURIComponent(urlObj.href)}`, type: 'text' }
              ];
              for (const proxy of proxyList) {
                  try {
                      const corsRes = await fetch(proxy.url);
                      if (!corsRes.ok) throw new Error(`HTTP ${corsRes.status}`);
                      html = await corsRes.text();
                      if (html && html.includes('FB_PUBLIC_LOAD_DATA_')) { fetchSuccess = true; break; }
                  } catch (err) {}
              }
              if (!fetchSuccess) {
                  alert("Google blocked fetch. Paste the raw Page Source HTML instead.");
                  setIsMappingLoading(false); return;
              }
              const searchStr = "var FB_PUBLIC_LOAD_DATA_ = ";
              const startIndex = html.indexOf(searchStr);
              if (startIndex !== -1) {
                  const dataStart = startIndex + searchStr.length;
                  let scriptEndIndex = html.indexOf("</" + "script>", dataStart);
                  extractedData = html.substring(dataStart, scriptEndIndex !== -1 ? scriptEndIndex : dataStart + 50000);
              } else throw new Error("Could not find schema.");
          } else if (inputRaw.includes('FB_PUBLIC_LOAD_DATA_')) {
              const actionMatch = inputRaw.match(/action="(https:\/\/docs\.google\.com\/forms\/[^"]+\/formResponse)"/);
              if (actionMatch) base = actionMatch[1]; else throw new Error("Could not find form action.");
              const searchStr = "var FB_PUBLIC_LOAD_DATA_ = ";
              const startIndex = inputRaw.indexOf(searchStr);
              if (startIndex !== -1) {
                  const dataStart = startIndex + searchStr.length;
                  let scriptEndIndex = inputRaw.indexOf("</" + "script>", dataStart);
                  extractedData = inputRaw.substring(dataStart, scriptEndIndex !== -1 ? scriptEndIndex : dataStart + 50000);
              } else throw new Error("Could not find schema.");
          } else throw new Error("Invalid input.");

          let cleanJsonStr = extractedData.trim();
          let openBrackets = 0; let endIndex = -1;
          for (let i = 0; i < cleanJsonStr.length; i++) {
              if (cleanJsonStr[i] === '[') openBrackets++;
              else if (cleanJsonStr[i] === ']') { openBrackets--; if (openBrackets === 0) { endIndex = i; break; } }
          }
          if (endIndex !== -1) cleanJsonStr = cleanJsonStr.substring(0, endIndex + 1);

          const formData = JSON.parse(cleanJsonStr);
          const formItems = formData[1][1];
          const parsedQuestions = []; let qIndex = 1;
          formItems.forEach(item => {
              if (!item || !Array.isArray(item)) return;
              const typeCode = item[3];
              const typeMap = { 0: 'text', 1: 'textarea', 2: 'radio', 3: 'select', 4: 'checkbox', 9: 'text', 10: 'text' };
              const qType = typeMap[typeCode];
              if (qType && item[4] && Array.isArray(item[4]) && item[4][0]) {
                  const entryIdStr = item[4][0][0];
                  const isRequired = item[4][0][2] === 1 || item[4][0][2] === true;
                  const label = item[1] || `Question ${qIndex}`;
                  const qObj = { id: 'q' + qIndex, label: label, type: qType, required: isRequired, googleId: `entry.${entryIdStr}` };
                  if ([2, 3, 4].includes(typeCode) && item[4][0][1]) {

          const newConfig = { ...settingsRef.current, useInternalForm: true, applyLink: inputRaw.startsWith('http') ? inputRaw : base.replace('formResponse', 'viewform'), webhookUrl: base, questions: parsedQuestions };

  // ----- IMPROVED POSTER OVERLAY GENERATOR (GRAPHIC DESIGN OPTIMIZED) -----
  const drawPosterOverlay = (ctx, expW, expH, s) => {
    const pad = expW * 0.05;

    // Draw Border
    ctx.strokeStyle = s.archColor;
    ctx.lineWidth = expW * 0.006;
    ctx.strokeRect(pad, pad, expW - pad * 2, expH - pad * 2);

    // Top Left Accent Box
    ctx.fillStyle = s.uiAccentColor;
    ctx.fillRect(pad, pad, expW * 0.04, expW * 0.04);

    // Bottom Panel for Text
    const panelH = expH * (s.posterPanelHeight ?? 0.38); // Dynamic panel height
    const panelY = expH - pad - panelH;
    ctx.fillStyle = s.bgColor;
    ctx.fillRect(pad, panelY, expW - pad * 2, panelH);

    // Divider Line
    ctx.beginPath();
    ctx.moveTo(pad, panelY);
    ctx.lineTo(expW - pad, panelY);
    ctx.stroke();

    ctx.textAlign = 'left';
    const leftMargin = pad + expW * 0.05;

    // DYNAMIC SEQUENTIAL Y-POSITIONING (Prevents overlaps!)
    let currentY = panelY + expH * 0.06 + (expH * (s.posterTextOffset ?? 0.0));

    // Event Tag (e.g. "Talks / Բաց քննարկումներ")
    ctx.fillStyle = s.uiAccentColor;
    ctx.font = `800 ${expW * 0.018}px monospace`;
    ctx.fillText(s.talkTag.toUpperCase(), leftMargin, currentY);

    // WCC Hero (Slightly smaller, to establish hierarchy)
    currentY += expH * 0.04;
    ctx.fillStyle = s.archColor === '#111111' || s.archColor === '#000000' ? '#ffffff' : s.archColor;
    ctx.font = `900 ${expW * 0.045}px ${s.uiFont.split(',')[0].replace(/['"]/g, '')}`;
    ctx.fillText(s.contentHero.toUpperCase(), leftMargin, currentY);

    // Speaker Name (Hero text of the layout)
    currentY += expH * 0.065;
    ctx.font = `900 ${expW * 0.08}px ${s.uiFont.split(',')[0].replace(/['"]/g, '')}`;
    ctx.fillText(s.talkTitle.toUpperCase(), leftMargin, currentY);

    // Speaker Title
    currentY += expH * 0.035;
    ctx.globalAlpha = 0.7;
    ctx.font = `italic 600 ${expW * 0.028}px ${s.uiFont.split(',')[0].replace(/['"]/g, '')}`;
    ctx.fillText(s.talkSubtitle, leftMargin, currentY);
    ctx.globalAlpha = 1.0;

    // Date & Location Block (Anchored specifically to the bottom)
    const bottomY = expH - pad - expH * 0.06 + (expH * (s.posterBottomOffset ?? 0.0));
    ctx.fillStyle = s.uiAccentColor;
    ctx.font = `800 ${expW * 0.022}px monospace`;

    const details = s.talkDetails.split('\n');
    ctx.fillText(details[0] ? details[0].toUpperCase() : '', leftMargin, bottomY);
    if(details[1]) {
        ctx.fillText(details[1].toUpperCase(), leftMargin + expW * 0.45, bottomY);
    }
  };

      // Apply Manual 3D Model Rotations

      shelterGroup.rotation.y = s.artRotY ?? 0.0;

      shelterGroup.position.x += ((targetArtPosRef.current.x + s.artPosX) - shelterGroup.position.x) * 0.05;
      shelterGroup.position.y += ((targetArtPosRef.current.y + s.artPosY + Math.sin(time * 0.0005) * 0.1) - shelterGroup.position.y) * 0.05;
      innerMesh.position.y = Math.sin(time * 0.001) * 0.1; cube.position.y = 1.5 + Math.sin(time * 0.002) * 0.2;

          // Calculate "object-fit: cover" for drawing the current live viewport onto the poster aspect ratio canvas
          const sourceW = renderer.domElement.width;

          const sourceAspect = sourceW / sourceH;

                 const size = 3.2;
                 const clonedTexture = texture.clone();
                 clonedTexture.needsUpdate = true;
                 clonedTexture.matrixAutoUpdate = false;

                 const imageAspect = texture.image.width / texture.image.height;
                 
                 // Advanced UV Matrix Transform to match CSS object-position and transform scale
                 const baseSx = imageAspect > 1.0 ? 1.0 / imageAspect : 1.0;
                 const baseSy = imageAspect > 1.0 ? 1.0 : imageAspect;
                 
                 const finalSx = baseSx / (settings.imageScale || 1.0);
                 const finalSy = baseSy / (settings.imageScale || 1.0);
                 
                 const rangeX = 1.0 - finalSx;
                 const rangeY = 1.0 - finalSy;
                 
                 const tx = rangeX * (settings.imageOffsetX ?? 0.5);
                 const ty = rangeY * (1.0 - (settings.imageOffsetY ?? 0.5)); // WebGL Y is inverted vs CSS

                        <button onClick={()=>handleSettingChange('mediaStyle', 'floating')} className={`flex-1 py-4 text-[10px] font-black border rounded-none transition-all tracking-widest ${settings.mediaStyle === 'floating' ? 'bg-white text-black border-white' : 'bg-transparent text-white opacity-50 border-white/20 hover:opacity-100 hover:border-white'}`}>FRAME</button>
                        <button onClick={()=>handleSettingChange('mediaStyle', 'wrap')} className={`flex-1 py-4 text-[10px] font-black border rounded-none transition-all tracking-widest ${settings.mediaStyle === 'wrap' ? 'bg-white text-black border-white' : 'bg-transparent text-white opacity-50 border-white/20 hover:opacity-100 hover:border-white'}`}>WRAP 3D</button>
                      </div>
                    </SectionGroup>
                </div>
            ) : activeEditorMenu === 'content' ? (
                <div className="flex flex-col gap-6 animate-in slide-in-from-left-4">
                    <button onClick={()=>setActiveEditorMenu('main')} className="text-[10px] font-black opacity-40 uppercase tracking-widest hover:opacity-100 transition-opacity text-left">← BACK TO MENU</button>

                    <SectionGroup title="TALKS & POSTER INFO (Export Data)">
                      <TextInput label="Top Tag (e.g. Guest Speaker)" value={settings.talkTag} onChange={v => handleSettingChange('talkTag', v)} />
                      <TextInput label="Speaker Name" value={settings.talkTitle} onChange={v => handleSettingChange('talkTitle', v)} />
                      <TextInput label="Speaker Title / Bio" value={settings.talkSubtitle} onChange={v => handleSettingChange('talkSubtitle', v)} />
                      <TextAreaInput label="Date & Location (Enter for new line)" value={settings.talkDetails} onChange={v => handleSettingChange('talkDetails', v)} />
                    </SectionGroup>

                    <SectionGroup title="OPEN CALL INFO (Website Public Data)">
                      <TextInput label="Headline / Organiser" value={settings.contentHero} onChange={v => handleSettingChange('contentHero', v)} />
                      <TextInput label="Tagline" value={settings.contentSub} onChange={v => handleSettingChange('contentSub', v)} />
                      <TextInput label="Sub-title" value={settings.contentTitle} onChange={v => handleSettingChange('contentTitle', v)} />
                      <TextAreaInput label="Intro Text (ARM)" value={settings.contentIntro1} onChange={v => handleSettingChange('contentIntro1', v)} />
                      <TextAreaInput label="Intro Text (ENG)" value={settings.contentIntro2} onChange={v => handleSettingChange('contentIntro2', v)} />
                      <TextAreaInput label="Main Text (ARM)" value={settings.contentDesc1} onChange={v => handleSettingChange('contentDesc1', v)} />
                      <TextAreaInput label="Main Text (ENG)" value={settings.contentDesc2} onChange={v => handleSettingChange('contentDesc2', v)} />
                      <TextInput label="Deadline Label" value={settings.contentDeadline} onChange={v => handleSettingChange('contentDeadline', v)} />
                    </SectionGroup>
                </div>
            ) : activeEditorMenu === 'forms' ? (
                <div className="flex flex-col gap-6 animate-in slide-in-from-left-4">
                    <button onClick={()=>setActiveEditorMenu('main')} className="text-[10px] font-black opacity-40 uppercase tracking-widest hover:opacity-100 transition-opacity text-left">← BACK TO MENU</button>
                    <SectionGroup title="Routing">
                      <div className="flex gap-3">
                        <button onClick={()=>handleSettingChange('useInternalForm', true)} className={`flex-1 py-4 text-[10px] font-black border rounded-none transition-all tracking-widest ${settings.useInternalForm ? 'bg-white text-black border-white shadow-md' : 'bg-transparent text-white opacity-40 border-white/20 hover:opacity-100 hover:border-white'}`}>CUSTOM UI</button>
                        <button onClick={()=>handleSettingChange('useInternalForm', false)} className={`flex-1 py-4 text-[10px] font-bold border rounded-none transition-all tracking-widest ${!settings.useInternalForm ? 'bg-white text-black border-white shadow-md' : 'bg-transparent text-white opacity-40 border-white/20 hover:opacity-100 hover:border-white'}`}>LINK OUT</button>
                      </div>
                      {!settings.useInternalForm && <TextInput label="External Form URL" value={settings.applyLink} onChange={v => handleSettingChange('applyLink', v)} placeholder="https://..." />}
                    </SectionGroup>

                    {settings.useInternalForm && (
                      <>
                        <SectionGroup title="Mapping Engine">
                          <TextInput label="formResponse Webhook URL" value={settings.webhookUrl} onChange={v => handleSettingChange('webhookUrl', v)} placeholder="https://docs.google.com/.../formResponse" />
                        </SectionGroup>
                        <SectionGroup title="Form Builder">
                            <div className="flex flex-col gap-4">
                                {settings.questions.map((q, idx) => (
                                   <div key={q.id} className="p-5 bg-[#222] border border-white/10 flex flex-col gap-4 relative group shadow-sm hover:border-white/30 transition-colors">
                                      <div className="flex justify-between items-center border-b border-white/10 pb-2">
                                          <span className="text-[10px] font-black uppercase tracking-[0.2em] text-white/50 font-mono">Field {idx + 1}</span>
                                          <button onClick={()=>removeQuestion(q.id)} className="text-[#ff2a00] hover:bg-[#ff2a00]/10 px-3 py-1.5 text-[10px] font-black uppercase tracking-widest transition-colors font-mono opacity-0 group-hover:opacity-100">Delete</button>
                                      </div>
                                      <div className="flex flex-col gap-1.5">
                                          <span className="text-[9px] font-black uppercase tracking-widest text-white/50 font-mono">Question Label</span>
                                          <input className="w-full bg-[#111] border border-white/10 p-3 text-xs font-bold outline-none focus:border-white font-mono transition-colors text-white" value={q.label} onChange={e=>updateQuestion(q.id, 'label', e.target.value)} />
                                      </div>
                                      <div className="grid grid-cols-3 gap-3">
                                         <div className="col-span-2 flex flex-col gap-1.5">
                                             <span className="text-[9px] font-black uppercase tracking-widest text-white/50 font-mono">Input Type</span>
                                             <select className="bg-[#111] border border-white/10 p-3 text-xs font-bold outline-none focus:border-white font-mono uppercase cursor-pointer transition-colors text-white" value={q.type} onChange={e=>updateQuestion(q.id, 'type', e.target.value)}>
                                                <option value="text">Short Text</option><option value="textarea">Long Text</option><option value="email">Email</option><option value="url">Link / URL</option><option value="radio">Radio Choice</option><option value="checkbox">Checkbox</option><option value="select">Dropdown</option>
                                             </select>
                                         </div>
                                         <div className="col-span-1 flex flex-col gap-1.5">
                                             <span className="text-[9px] font-black uppercase tracking-widest text-white/50 font-mono">Required</span>
                                             <button onClick={()=>updateQuestion(q.id, 'required', !q.required)} className={`h-full p-3 text-xs font-black border transition-all flex items-center justify-center tracking-widest ${q.required ? 'bg-white text-black border-white' : 'bg-transparent text-white opacity-40 border-white/20 hover:opacity-100 hover:border-white'}`}>REQ {q.required ? '✓' : ''}</button>
                                         </div>
                                      </div>
                                      {['radio', 'checkbox', 'select'].includes(q.type) && (
                                         <div className="flex flex-col gap-1.5 bg-[#111] p-3 border border-white/10">
                                             <span className="text-[9px] font-black uppercase tracking-widest text-white/50 font-mono">Options (Comma separated)</span>
                                             <input className="bg-transparent border-b border-white/20 p-2.5 text-xs font-mono outline-none focus:border-white text-white" placeholder="Option 1, Option 2..." value={(q.options || []).join(', ')} onChange={e=>updateQuestion(q.id, 'options', e.target.value.split(',').map(s=>s.trim()))} />
                                         </div>
                                      )}
                                      <div className="flex flex-col gap-1.5 pt-2 border-t border-white/10 mt-1">
                                          <span className="text-[9px] font-black uppercase tracking-widest text-blue-400 font-mono">Google Form entry.ID</span>
                                          <input className="bg-blue-900/20 border border-blue-500/30 p-3 text-xs font-mono outline-none focus:border-blue-400 text-blue-200 font-bold tracking-wider" placeholder="entry.123456" value={q.googleId || ''} onChange={e=>updateQuestion(q.id, 'googleId', e.target.value)} />
                                      </div>
                                   </div>
                                ))}
                            </div>
                            <button onClick={addQuestion} className="w-full py-5 border border-dashed border-white/20 bg-[#222] hover:bg-white hover:text-black transition-all font-black text-[11px] uppercase tracking-[0.2em] font-mono mt-2">+ Add Custom Field</button>
                        </SectionGroup>
                      </>
                    )}
                </div>
            ) : activeEditorMenu === 'mapper' ? (
                <div className="flex flex-col gap-6 animate-in slide-in-from-left-4">
                    <button onClick={()=>setActiveEditorMenu('main')} className="text-[10px] font-black opacity-40 uppercase tracking-widest hover:opacity-100 transition-opacity text-left">← BACK TO MENU</button>
                    <SectionGroup title="Form Mapping Data">
                        <p className="text-[10px] font-mono opacity-60 leading-relaxed text-white">Paste your Google Form URL here to automatically extract and map your questions.</p>
                        <textarea value={prefillUrl} onChange={(e)=>setPrefillUrl(e.target.value)} placeholder="https://docs.google.com/forms/..." className="w-full h-20 p-4 text-xs border border-white/10 bg-[#222] text-white rounded-none outline-none focus:border-white custom-scrollbar font-mono break-all transition-colors" />
                        <button onClick={handleAutoMapForm} disabled={isMappingLoading} className="py-4 bg-[#ff2a00] hover:bg-red-700 text-white text-[10px] font-black rounded-none uppercase tracking-[0.2em] transition-colors border border-[#ff2a00] shadow-md">
                          {isMappingLoading ? 'Mapping Form...' : 'Auto-Map Form'}
                        </button>
                    </SectionGroup>
                </div>
            ) : activeEditorMenu === 'colors' ? (
              <div className="flex flex-col gap-6 animate-in slide-in-from-left-4">
                  <button onClick={()=>setActiveEditorMenu('main')} className="text-[10px] font-black opacity-40 uppercase tracking-widest hover:opacity-100 transition-opacity text-left">← BACK TO MENU</button>
                  <SectionGroup title="Typography">
                    <div className="flex flex-col gap-2">
                      <label className="text-[10px] text-white/50 font-black uppercase tracking-widest font-mono">Global Font</label>
                      <select className="bg-[#222] border border-white/10 text-white rounded-none p-3 text-xs outline-none focus:border-white font-mono cursor-pointer transition-colors" value={settings.uiFont} onChange={e=>handleSettingChange('uiFont', e.target.value)}>
                        <option value="'Space Grotesk', sans-serif">Space Grotesk</option><option value="'Montserrat', sans-serif">Montserrat</option><option value="'Inter', sans-serif">Inter</option><option value="'Playfair Display', serif">Playfair Display (Serif)</option><option value="'JetBrains Mono', monospace">JetBrains Mono</option>
                      </select>
                    </div>
                  </SectionGroup>
                  <SectionGroup title="Colors">
                    <ColorInput label="Background" value={settings.bgColor} onChange={v => handleSettingChange('bgColor', v)} />
                    <ColorInput label="Outer Arch" value={settings.archColor} onChange={v => handleSettingChange('archColor', v)} />
                    <ColorInput label="Glass Core" value={settings.glassColor} onChange={v => handleSettingChange('glassColor', v)} />
                    <ColorInput label="Primary Accent" value={settings.uiAccentColor} onChange={v => handleSettingChange('uiAccentColor', v)} />
                  </SectionGroup>
                  <SectionGroup title="Geometry Controls">
                    <div className="flex flex-col gap-2">
                      <label className="text-[10px] text-white/50 font-black uppercase tracking-widest font-mono">Outer Arch</label>
                      <select className="bg-[#222] border border-white/10 text-white rounded-none p-3 text-xs outline-none focus:border-white font-mono uppercase cursor-pointer transition-colors" value={settings.archShape} onChange={e=>handleSettingChange('archShape', e.target.value)}>
                        <option value="torus_half">Half Torus</option><option value="torus_full">Full Torus</option><option value="cylinder">Cylinder</option><option value="box">Monolith</option><option value="wireframe_torus">Wireframe</option><option value="none">None</option>
                      </select>
                    </div>
                    <div className="flex flex-col gap-2 mt-3">
                      <label className="text-[10px] text-white/50 font-black uppercase tracking-widest font-mono">Glass Core</label>
                      <select className="bg-[#222] border border-white/10 text-white rounded-none p-3 text-xs outline-none focus:border-white font-mono uppercase cursor-pointer transition-colors" value={settings.coreShape} onChange={e=>handleSettingChange('coreShape', e.target.value)}>
                        <option value="sphere">Sphere</option><option value="box">Cube</option><option value="icosahedron">Crystal</option><option value="none">None</option>
                      </select>
                    </div>
                    <div className="flex flex-col gap-2 mt-3">
                      <label className="text-[10px] text-white/50 font-black uppercase tracking-widest font-mono">Orbit Rings</label>
                      <select className="bg-[#222] border border-white/10 text-white rounded-none p-3 text-xs outline-none focus:border-white font-mono uppercase cursor-pointer transition-colors" value={settings.ringShape} onChange={e=>handleSettingChange('ringShape', e.target.value)}>
                        <option value="thin">Thin Orbit</option><option value="thick">Thick Ring</option><option value="square">Square Frame</option><option value="orbit_rings">Multi-Orbit</option><option value="none">None</option>
                      </select>
                    </div>
                  </SectionGroup>
              </div>
            ) : (
                <div className="flex flex-col gap-4 animate-in slide-in-from-left-4">
                    <button onClick={()=>setActiveEditorMenu('main')} className="text-[10px] font-black opacity-40 uppercase tracking-widest hover:opacity-100 transition-opacity text-left mb-2">← BACK TO MENU</button>

                    <SectionGroup title="Export Standalone HTML">
                        <p className="text-[9px] font-mono text-white/40 mt-1 mb-2">Download a copy of this entire app where all your current settings, photos, and texts are permanently saved as the new defaults. Use this file on your local machine.</p>
                        <button onClick={handleExportHtml} className="py-4 bg-[#ff2a00] hover:bg-red-700 text-white border border-[#ff2a00] rounded-none text-[11px] font-black uppercase tracking-[0.2em] shadow-lg transition-colors">Download Configured HTML</button>
                    </SectionGroup>

                    <SectionGroup title="Export Poster & Video Settings">
                        <div className="grid grid-cols-2 gap-3">
                            <TextInput label="Width (px)" type="number" value={settings.exportWidth} onChange={v => handleSettingChange('exportWidth', parseInt(v) || 1080)} />
                            <TextInput label="Height (px)" type="number" value={settings.exportHeight} onChange={v => handleSettingChange('exportHeight', parseInt(v) || 1350)} />
                        </div>
                        <TextInput label="Video Reel Duration (sec)" type="number" value={settings.videoDuration} onChange={v => handleSettingChange('videoDuration', parseFloat(v) || 5.0)} />
                        <p className="text-[9px] font-mono text-white/40 mt-1">Hint: Standard Post = 1080x1350. Instagram/TikTok Story = 1080x1920.</p>
                    </SectionGroup>

                    <SectionGroup title="Artwork Composition (Poster Space)">
                        <SliderInput label="Vertical Position (Up/Down)" value={settings.artPosY} min={-5} max={5} step={0.1} onChange={v => handleSettingChange('artPosY', v)} />
                        <SliderInput label="Horizontal Position (Left/Right)" value={settings.artPosX} min={-5} max={5} step={0.1} onChange={v => handleSettingChange('artPosX', v)} />
                        <SliderInput label="Zoom / Scale" value={settings.artZoom} min={-10} max={10} step={0.1} onChange={v => handleSettingChange('artZoom', v)} />
                        <SliderInput label="Rotation (X-Axis)" value={settings.artRotX ?? 0.0} min={-3.14} max={3.14} step={0.01} onChange={v => handleSettingChange('artRotX', v)} />
                        <SliderInput label="Rotation (Y-Axis)" value={settings.artRotY ?? 0.0} min={-3.14} max={3.14} step={0.01} onChange={v => handleSettingChange('artRotY', v)} />
                        <SliderInput label="Rotation (Z-Axis)" value={settings.artRotZ ?? 0.0} min={-3.14} max={3.14} step={0.01} onChange={v => handleSettingChange('artRotZ', v)} />
                    </SectionGroup>

                    <SectionGroup title="Poster Text Layout">
                        <SliderInput label="Black Panel Size" value={settings.posterPanelHeight ?? 0.38} min={0.2} max={0.8} step={0.01} onChange={v => handleSettingChange('posterPanelHeight', v)} />
                        <SliderInput label="Main Text Vertical Pan" value={settings.posterTextOffset ?? 0.0} min={-0.3} max={0.3} step={0.01} onChange={v => handleSettingChange('posterTextOffset', v)} />
                        <SliderInput label="Bottom Text Vertical Pan" value={settings.posterBottomOffset ?? 0.0} min={-0.3} max={0.3} step={0.01} onChange={v => handleSettingChange('posterBottomOffset', v)} />
                    </SectionGroup>

                    <button onClick={() => handleExportImage(false)} className="py-5 bg-[#222] border border-white/20 text-white rounded-none text-[11px] font-black uppercase tracking-[0.2em] hover:bg-white hover:text-black transition-colors">Raw Render (PNG)</button>
                    <button onClick={() => handleExportImage(true)} className="py-5 bg-white text-black border border-white rounded-none text-[11px] font-black uppercase tracking-[0.2em] shadow-lg hover:bg-neutral-300 transition-colors">Poster Layout (PNG)</button>
                    <button onClick={handleStartVideoRecording} disabled={isRecording} className={`py-5 text-white border-2 rounded-none text-[11px] font-black uppercase tracking-[0.2em] shadow-lg transition-colors ${isRecording ? 'bg-red-800 border-red-800' : 'bg-[#ff2a00] border-[#ff2a00] hover:bg-red-700'}`}>{isRecording ? `Recording Scene (${settings.videoDuration}s)` : 'Record Poster Reel (WEBM)'}</button>
                </div>
            )}
          </div>
          <div className="p-6 bg-[#111] border-t border-white/10 flex gap-2">
              <button onClick={handleSaveSettings} className="flex-1 py-5 bg-white text-black text-[11px] font-black rounded-none uppercase tracking-[0.2em] w-full hover:bg-neutral-300 transition-colors shadow-[4px_4px_0px_rgba(255,255,255,0.2)] active:translate-y-1 active:translate-x-1 active:shadow-none">
                  {isSaved ? 'CONFIG SAVED ✓' : 'SAVE CONFIGURATION'}
              </button>
          </div>
        </div>
      )}

      {/* EXPORT OVERLAY */}
      {exportedImage && (
        <div className="absolute inset-0 z-[200] bg-black/95 flex flex-col items-center justify-center p-8 animate-in fade-in duration-300">
            <button onClick={()=>setExportedImage(null)} className="absolute top-8 right-8 text-white font-bold opacity-50 hover:opacity-100 transition-opacity">CLOSE [X]</button>
            <button onClick={handleDownloadImage} className="mb-6 px-12 py-4 bg-white text-black font-black uppercase tracking-[0.2em] rounded-none shadow-2xl hover:bg-neutral-200 transition-colors border-2 border-white">SAVE PNG</button>
            <img src={exportedImage} className="max-h-[70vh] rounded-none shadow-2xl border border-white/20" />
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
