// --- GEOMETRY FACTORIES ---
const createArchGeo = (type) => {
  if (type === 'none') return new THREE.BoxGeometry(0,0,0);
  switch(type) {
    case 'torus_full': return new THREE.TorusGeometry(2.4, 0.35, 32, 100);
    case 'cylinder': return new THREE.CylinderGeometry(2.4, 2.4, 0.7, 64);
    case 'box': return new THREE.BoxGeometry(4.8, 0.7, 4.8);
    case 'wireframe_torus': return new THREE.TorusGeometry(3, 0.4, 16, 64);
    case 'torus_half': default: return new THREE.TorusGeometry(2.4, 0.35, 32, 100, Math.PI * 1.5);
  }
};
const createCoreGeo = (type) => {
  if (type === 'none') return new THREE.BoxGeometry(0,0,0);
  switch(type) {
    case 'box': return new THREE.BoxGeometry(1.8, 1.8, 1.8);
    case 'icosahedron': return new THREE.IcosahedronGeometry(1.2, 0);
    case 'sphere': default: return new THREE.SphereGeometry(1.2, 64, 64);
  }
};
const createRingGeo = (type, radius) => {
  const thick = 0.02;
  if (type === 'none') return new THREE.BoxGeometry(0,0,0);
  switch(type) {
    case 'thick': return new THREE.TorusGeometry(radius, 0.08, 16, 100);
    case 'square': return new THREE.TorusGeometry(radius, 0.06, 4, 100);
    case 'orbit_rings': return new THREE.TorusGeometry(radius, 0.005, 8, 100);
    case 'thin': default: return new THREE.TorusGeometry(radius, thick, 16, 100);
  }
};

function App() {
  const mountRef = useRef(null);
  const sceneRefs = useRef({});

  // UX State
  const [layer, setLayer] = useState(0);
  const [isEditorOpen, setIsEditorOpen] = useState(false);
  const [showSettingsBtn, setShowSettingsBtn] = useState(false);
  const [activeEditorMenu, setActiveEditorMenu] = useState('main');
  const [exportedImage, setExportedImage] = useState(null);
  const [isSaved, setIsSaved] = useState(false);

  // Form State
  const [formAnswers, setFormAnswers] = useState({});
  const [formStatus, setFormStatus] = useState('idle');
  const [submissions, setSubmissions] = useState(() => {
    try {
        const saved = localStorage.getItem('wcc_app_submissions');
        return saved ? JSON.parse(saved) : [];
    } catch(e) { return []; }
  });

  // Media & Recording States
  const [isRecording, setIsRecording] = useState(false);
  const [tempMediaUrl, setTempMediaUrl] = useState('');

  // Mapper State
  const [prefillUrl, setPrefillUrl] = useState('https://docs.google.com/forms/d/e/1FAIpQLSemFIErSjuiLq7fRxoq5cJVLS7PpKexclBI7f5otVgLgYaPVw/viewform');
  const [isMappingLoading, setIsMappingLoading] = useState(false);

  // Debug States
  const [showDebug, setShowDebug] = useState(false);
  const [debugLogs, setDebugLogs] = useState([]);
  const [debugCopyText, setDebugCopyText] = useState('Copy Logs');
  const [sourceCopyText, setSourceCopyText] = useState('Copy App');

  // REFS
  const targetArtPosRef = useRef({ x: 0, y: 0.5, z: 8.0 });
  const isRecordingRef = useRef(false);
  const originalRendererStateRef = useRef(null);
  const mediaRecorderRef = useRef(null);
  const chunksRef = useRef([]);
  const recCanvasRef = useRef(null);
  const recCtxRef = useRef(null);
  const debugScrollRef = useRef(null);

  const [settings, setSettings] = useState(() => {
    try {
        const saved = localStorage.getItem('wcc_app_settings_v4');
        if (saved) {
            const parsed = JSON.parse(saved);
            if (parsed.mediaUrl && !parsed.mediaGallery) parsed.mediaGallery = [parsed.mediaUrl];
            if (!parsed.mediaGallery) parsed.mediaGallery = [];
            return { ...DEFAULT_SETTINGS, ...parsed };
        }
    } catch (e) {}
    return DEFAULT_SETTINGS;
  });

  const settingsRef = useRef(settings);
  settingsRef.current = settings;

  // --- DEBUG LOGGER ---
  const logDebug = (type, message, details = '') => {
      console.log(`[${type}] ${message}`, details);
      setDebugLogs(prev => [...prev, {
          time: new Date().toISOString().split('T')[1].slice(0, -1),
          type,
          message,
          details: typeof details === 'object' ? JSON.stringify(details, null, 2) : details
      }]);
  };

  const handleCopyDebug = () => {
      const logString = debugLogs.map(log => `[${log.time}] [${log.type}] ${log.message}${log.details ? '\n' + log.details : ''}`).join('\n\n');
      const textArea = document.createElement("textarea");
      textArea.value = logString;
      document.body.appendChild(textArea);
      textArea.select();
      try {
          document.execCommand('copy');
          setDebugCopyText('COPIED!');
          setTimeout(() => setDebugCopyText('Copy Logs'), 2000);
      } catch (err) {
          console.error('Copy failed', err);
      }
      document.body.removeChild(textArea);
  };

  const handleCopySource = () => {
      const scriptNode = document.getElementById('app-source');
      if (!scriptNode) return;
      const replacementStr = `const DEFAULT_SETTINGS = ${JSON.stringify(settings, null, 2)};`;
      const finalSourceCode = scriptNode.textContent.replace(/const DEFAULT_SETTINGS = \{[\s\S]*?\};/, replacementStr);
      const newHtml = `<!DOCTYPE html>\n<html lang="en">\n<head>\n  <meta charset="UTF-8">\n  <meta name="viewport" content="width=device-width, initial-scale=1.0">\n  <title>${settings.contentHero}</title>\n  <script src="https://cdn.tailwindcss.com"><\/script>\n  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin><\/script>\n  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin><\/script>\n  <script src="https://unpkg.com/@babel/standalone/babel.min.js"><\/script>\n  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"><\/script>\n</head>\n<body class="bg-[#e4e4e4] overflow-hidden m-0 p-0 text-neutral-900 font-sans">\n  <div id="root"></div>\n  <script type="text/babel" id="app-source">\n${finalSourceCode}\n  <\/script>\n</body>\n</html>`;

      const textArea = document.createElement("textarea");
      textArea.value = newHtml;
      document.body.appendChild(textArea);
      textArea.select();
      try {
          document.execCommand('copy');
          setSourceCopyText('COPIED!');
          setTimeout(() => setSourceCopyText('Copy App'), 2000);
      } catch (err) {
          console.error('Copy failed', err);
      }
      document.body.removeChild(textArea);
  };

  useEffect(() => {
      if (debugScrollRef.current) debugScrollRef.current.scrollTop = debugScrollRef.current.scrollHeight;
  }, [debugLogs]);

  // ---------------------------------------------------------
  // CORE HANDLERS
  // ---------------------------------------------------------
  const handleSettingChange = (key, value) => setSettings(prev => ({ ...prev, [key]: value }));
  
  const handleSaveSettings = () => {
    try {
        localStorage.setItem('wcc_app_settings_v4', JSON.stringify(settings));
        setIsSaved(true);
        setTimeout(() => setIsSaved(false), 2000);
    } catch (e) {
        alert("Cannot save to localStorage. The uploaded images are likely too large (browser 5MB limit). Please use external Image URLs.");
    }
  };

  const handleDownloadImage = () => { if (!exportedImage) return; const a = document.createElement('a'); a.download = 'art_capture.png'; a.href = exportedImage; a.click(); };

  const handleImageUpload = async (e) => {
    const files = Array.from(e.target.files);
    if (files.length === 0) return;

    const readPromises = files.map(file => {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (ev) => resolve(ev.target.result);
            reader.readAsDataURL(file);
        });
    });

    const results = await Promise.all(readPromises);
    setSettings(prev => ({ ...prev, mediaGallery: [...(prev.mediaGallery || []), ...results] }));
    e.target.value = null;
  };

  const handleAddExternalUrl = () => {
    if(!tempMediaUrl.trim()) return;
    setSettings(prev => ({ ...prev, mediaGallery: [...(prev.mediaGallery || []), tempMediaUrl.trim()] }));
    setTempMediaUrl('');
  };

  const handleRemoveMedia = (index) => {
    const newGallery = [...settings.mediaGallery];
    newGallery.splice(index, 1);
    handleSettingChange('mediaGallery', newGallery);
  };

  const handleDownloadWebsiteBuild = () => {
    const scriptNode = document.getElementById('app-source'); if (!scriptNode) return;
    const replacementStr = `const DEFAULT_SETTINGS = ${JSON.stringify(settings, null, 2)};`;
    const finalSourceCode = scriptNode.textContent.replace(/const DEFAULT_SETTINGS = \{[\s\S]*?\};/, replacementStr);
    const newHtml = `<!DOCTYPE html>\n<html lang="en">\n<head>\n  <meta charset="UTF-8">\n  <meta name="viewport" content="width=device-width, initial-scale=1.0">\n  <title>${settings.contentHero}</title>\n  <script src="https://cdn.tailwindcss.com"><\/script>\n  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin><\/script>\n  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin><\/script>\n  <script src="https://unpkg.com/@babel/standalone/babel.min.js"><\/script>\n  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"><\/script>\n</head>\n<body class="bg-[#e4e4e4] overflow-hidden m-0 p-0 text-neutral-900 font-sans">\n  <div id="root"></div>\n  <script type="text/babel" id="app-source">\n${finalSourceCode}\n  <\/script>\n</body>\n</html>`;
    const blob = new Blob([newHtml], { type: 'text/html' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'index.html'; a.click();
  };

  const handleFormSubmit = () => {
    // Custom Validation: Ensure all required fields are actually filled out
    for (const q of settings.questions) {
        if (q.required) {
            const val = formAnswers[q.id];
            if (!val || (Array.isArray(val) && val.length === 0) || (typeof val === 'string' && val.trim() === '')) {
                alert(`Please answer the required question: [ ${q.label} ]`);
                return;
            }
        }
    }

    setFormStatus('submitting');

    // 1. Save locally for CSV download
    const newSubmission = { date: new Date().toISOString(), ...formAnswers };
    const updatedSubmissions = [...submissions, newSubmission];
    setSubmissions(updatedSubmissions);
    try { localStorage.setItem('wcc_app_submissions', JSON.stringify(updatedSubmissions)); } catch(e) {}

    // 2. Transmit to Google Forms via Hidden IFrame (Bypasses 403 / CORS)

  const handleAutoMapForm = async (silentMode = false) => {
      const isSilent = silentMode === true; // Prevent click events from evaluating to true
      
      if (!isSilent) {
          logDebug('INFO', 'Starting Native Form Auto-Map Process');
          setShowDebug(true);
      }
      
      let inputRaw = prefillUrl.trim();
      if (!inputRaw) return;

      setIsMappingLoading(true);
      try {
          let extractedData = "";
          let base = "";

          if (inputRaw.startsWith('http')) {
              if (!inputRaw.includes('docs.google.com/forms')) {
                  throw new Error("Must be a docs.google.com/forms URL.");
              }
              let urlObj = new URL(inputRaw);
              base = urlObj.origin + urlObj.pathname;
              base = base.replace('viewform', 'formResponse').replace('prefill', 'formResponse');
              if (!isSilent) logDebug('INFO', 'Webhook Target Base URL', base);

              let html = "";
              let fetchSuccess = false;
              
              // Robust proxy list for bypassing Google blocks on localhost
              const proxyList = [
                  { name: 'AllOrigins', url: `https://api.allorigins.win/raw?url=${encodeURIComponent(urlObj.href)}`, type: 'text' },
                  { name: 'CorsProxy', url: `https://corsproxy.io/?${encodeURIComponent(urlObj.href)}`, type: 'text' },
                  { name: 'CodeTabs', url: `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(urlObj.href)}`, type: 'text' },
                  { name: 'ThingProxy', url: `https://thingproxy.freeboard.io/fetch/${urlObj.href}`, type: 'text' }
              ];

              for (const proxy of proxyList) {
                  if (!isSilent) logDebug('FETCH', `Trying Proxy: ${proxy.name}`, proxy.url);
                  try {
                      const corsRes = await fetch(proxy.url);
                      if (!corsRes.ok) throw new Error(`HTTP ${corsRes.status}`);
                      html = proxy.type === 'json' ? (await corsRes.json()).contents : await corsRes.text();
                      if (html && html.includes('FB_PUBLIC_LOAD_DATA_')) {
                          fetchSuccess = true;
                          break;
                      }
                  } catch (err) { if (!isSilent) logDebug('WARN', `${proxy.name} failed`, err.message); }
              }

              if (!fetchSuccess) {
                  if (!isSilent) alert("Google's security blocked the automatic fetch. \n\nFALLBACK MODE: Please open your Google Form in a new browser tab, right-click and select 'View Page Source', copy all the code, and paste it into this box instead of the URL!");
                  setIsMappingLoading(false);
                  return;
              }

              const searchStr = "var FB_PUBLIC_LOAD_DATA_ = ";
              const startIndex = html.indexOf(searchStr);
              if (startIndex !== -1) {
                  const dataStart = startIndex + searchStr.length;
                  let scriptEndIndex = html.indexOf("</" + "script>", dataStart);
                  let dataEnd = scriptEndIndex !== -1 ? scriptEndIndex : dataStart + 50000;
                  if (dataEnd - dataStart > 100000) dataEnd = dataStart + 100000;
                  extractedData = html.substring(dataStart, dataEnd);
              } else { throw new Error("Could not find schema pattern in fetched HTML."); }

          } else if (inputRaw.includes('FB_PUBLIC_LOAD_DATA_')) {
              if (!isSilent) logDebug('INFO', 'Raw HTML detected. Bypassing fetch.');
              const actionMatch = inputRaw.match(/action="(https:\/\/docs\.google\.com\/forms\/[^"]+\/formResponse)"/);
              if (actionMatch) {
                  base = actionMatch[1];
                  if (!isSilent) logDebug('INFO', 'Extracted Webhook Target', base);
              } else {
                  throw new Error("Could not find the form action URL. Make sure you copied the entire page source.");
              }

              const searchStr = "var FB_PUBLIC_LOAD_DATA_ = ";
              const startIndex = inputRaw.indexOf(searchStr);
              if (startIndex !== -1) {
                  const dataStart = startIndex + searchStr.length;
                  let scriptEndIndex = inputRaw.indexOf("</" + "script>", dataStart);
                  let dataEnd = scriptEndIndex !== -1 ? scriptEndIndex : dataStart + 50000;
                  if (dataEnd - dataStart > 100000) dataEnd = dataStart + 100000;
                  extractedData = inputRaw.substring(dataStart, dataEnd);
              } else { throw new Error("Could not find schema pattern in pasted HTML."); }
          } else {
              throw new Error("Invalid input. Paste a Google Forms URL or the raw Page Source HTML.");
          }

          // Pure JS JSON Parser (No AI API Keys Needed)
          if (!isSilent) logDebug('INFO', 'Parsing JSON data natively...');
          
          let cleanJsonStr = extractedData.trim();
          let openBrackets = 0;
          let endIndex = -1;
          for (let i = 0; i < cleanJsonStr.length; i++) {
              if (cleanJsonStr[i] === '[') openBrackets++;
              else if (cleanJsonStr[i] === ']') {
                  openBrackets--;
                  if (openBrackets === 0) {
                      endIndex = i;
                      break;
                  }
              }
          }
          if (endIndex !== -1) {
              cleanJsonStr = cleanJsonStr.substring(0, endIndex + 1);
          }

          const formData = JSON.parse(cleanJsonStr);
          const formItems = formData[1][1];
          if (!Array.isArray(formItems)) throw new Error("Invalid form data structure");

          const parsedQuestions = [];
          let qIndex = 1;

          formItems.forEach(item => {
              if (!item || !Array.isArray(item)) return;
              const typeCode = item[3];
              const typeMap = { 0: 'text', 1: 'textarea', 2: 'radio', 3: 'select', 4: 'checkbox', 9: 'text', 10: 'text' };
              const qType = typeMap[typeCode];

              if (qType && item[4] && Array.isArray(item[4]) && item[4][0]) {
                  const entryIdStr = item[4][0][0];
                  // item[4][0][2] explicitly maps Google's 'required' asterisk flag
                  const isRequired = item[4][0][2] === 1 || item[4][0][2] === true;
                  const label = item[1] || `Question ${qIndex}`;
                  
                  const qObj = {
                      id: 'q' + qIndex,
                      label: label,
                      type: qType,
                      required: isRequired,
                      googleId: `entry.${entryIdStr}`
                  };

                  if ([2, 3, 4].includes(typeCode) && item[4][0][1] && Array.isArray(item[4][0][1])) {
                      qObj.options = item[4][0][1].map(opt => opt[0]).filter(o => o !== null && o !== undefined && o !== "");
                  }

                  parsedQuestions.push(qObj);
                  qIndex++;
              }
          });

          if (parsedQuestions.length === 0) throw new Error("No questions could be parsed.");

          const newConfig = { 
              ...settingsRef.current, 
              useInternalForm: true, 
              applyLink: inputRaw.startsWith('http') ? inputRaw : base.replace('formResponse', 'viewform'), 
              webhookUrl: base, 
              questions: parsedQuestions 
          };

          setSettings(newConfig);
          setFormAnswers({});
          
          if (!isSilent) {
              setPrefillUrl('');
              logDebug('SUCCESS', 'Native form mapping complete.');
              alert("Form Map Complete! Click 'Save Configuration' at the bottom to apply it.");
          } else {
              try { localStorage.setItem('wcc_app_settings_v4', JSON.stringify(newConfig)); } catch(e) {}
              console.log("Silently mapped Google Form defaults in the background.");
          }

      } catch (e) {
          if (!isSilent) {
              logDebug('ERROR', 'Auto-map failed', e.message);
              alert("Failed to map form: " + e.message);
          } else {
              console.warn("Silent background mapping failed.", e.message);
          }
      }
      setIsMappingLoading(false);
  };

    ctx.lineTo(expW - pad, expH - pad - panelH);
    ctx.stroke();
    ctx.textAlign = 'left';
    const leftMargin = pad + expW * 0.04;
    let textY = expH - pad - panelH + expH * 0.06;
    ctx.fillStyle = s.uiAccentColor;
    ctx.font = `800 ${expW * 0.02}px monospace`;

        if (tapCount >= 3) { 
            setShowSettingsBtn(p => !p); setIsEditorOpen(false); tapCount = 0; 
        } else { 
            tapTimer = setTimeout(() => { tapCount = 0; }, 400); 
        } 
    };
    window.addEventListener('keydown', handleKeyDown); 
    window.addEventListener('touchstart', handleInteract);
    window.addEventListener('mousedown', handleInteract);
    return () => { 
        window.removeEventListener('keydown', handleKeyDown); 
        window.removeEventListener('touchstart', handleInteract);
        window.removeEventListener('mousedown', handleInteract); 
    };
  }, []);

                    <SectionGroup title="Copy Editor">
                      <TextInput label="Tagline" value={settings.contentTag} onChange={v => handleSettingChange('contentTag', v)} />
                      <TextInput label="Headline" value={settings.contentTitle} onChange={v => handleSettingChange('contentTitle', v)} />
                      <TextAreaInput label="Intro (ARM)" value={settings.contentIntro1} onChange={v => handleSettingChange('contentIntro1', v)} />
                      <TextAreaInput label="Intro (ENG)" value={settings.contentIntro2} onChange={v => handleSettingChange('contentIntro2', v)} />
                      <TextAreaInput label="Main Text (ARM)" value={settings.contentDesc1} onChange={v => handleSettingChange('contentDesc1', v)} />
                      <TextAreaInput label="Main Text (ENG)" value={settings.contentDesc2} onChange={v => handleSettingChange('contentDesc2', v)} />
                      <TextInput label="Deadline Label" value={settings.contentDeadline} onChange={v => handleSettingChange('contentDeadline', v)} />
                    </SectionGroup>
                </div>
            ) : activeEditorMenu === 'data' ? (
                <div className="flex flex-col gap-6 animate-in slide-in-from-left-4">
                    <button onClick={()=>setActiveEditorMenu('main')} className="text-[10px] font-black opacity-40 uppercase tracking-widest hover:opacity-100 transition-opacity text-left">← BACK TO MENU</button>
                    <SectionGroup title="Local Submissions">
                        <p className="text-[10px] font-mono opacity-60 leading-relaxed">
                            Applications are saved securely in your browser's local storage.
                            <br/><br/>
                            Currently stored: <strong className="text-black text-sm">{submissions.length}</strong>
                        </p>
                        <button onClick={handleDownloadSubmissions} className="py-4 bg-[#ff2a00] hover:bg-red-700 text-white text-[10px] font-black rounded-none uppercase tracking-[0.2em] transition-colors border-2 border-[#ff2a00] shadow-md">
                            Download as CSV
                        </button>
                        <button onClick={handleClearSubmissions} className="py-3 text-[#ff2a00] border-2 border-[#ff2a00]/30 hover:bg-[#ff2a00]/10 text-[10px] font-black rounded-none uppercase tracking-[0.2em] transition-colors">
                            Clear All Data
                        </button>
                    </SectionGroup>
                </div>
            ) : activeEditorMenu === 'forms' ? (
                <div className="flex flex-col gap-6 animate-in slide-in-from-left-4">
                    <button onClick={()=>setActiveEditorMenu('main')} className="text-[10px] font-black opacity-40 uppercase tracking-widest hover:opacity-100 transition-opacity text-left">← BACK TO MENU</button>
                    <SectionGroup title="Routing">
                      <div className="flex gap-3">
                        <button onClick={()=>handleSettingChange('useInternalForm', true)} className={`flex-1 py-4 text-[10px] font-black border-2 rounded-none transition-all tracking-widest ${settings.useInternalForm ? 'bg-black text-white border-black shadow-md' : 'bg-white text-black opacity-40 border-black/20 hover:opacity-100 hover:border-black'}`}>CUSTOM UI</button>
                        <button onClick={()=>handleSettingChange('useInternalForm', false)} className={`flex-1 py-4 text-[10px] font-bold border-2 rounded-none transition-all tracking-widest ${!settings.useInternalForm ? 'bg-black text-white border-black shadow-md' : 'bg-white text-black opacity-40 border-black/20 hover:opacity-100 hover:border-black'}`}>LINK OUT</button>
                      </div>
                      {!settings.useInternalForm && <TextInput label="External Form URL" value={settings.applyLink} onChange={v => handleSettingChange('applyLink', v)} placeholder="https://..." />}
                    </SectionGroup>

                    {settings.useInternalForm && (
                      <>
                        <SectionGroup title="Mapping Engine">
                          <TextInput label="formResponse Webhook URL" value={settings.webhookUrl} onChange={v => handleSettingChange('webhookUrl', v)} placeholder="https://docs.google.com/.../formResponse" />
                        </SectionGroup>

                        <SectionGroup title="Form Builder">
                            <div className="flex flex-col gap-4">
                                {settings.questions.map((q, idx) => (
                                   <div key={q.id} className="p-5 bg-white border-2 border-black/10 flex flex-col gap-4 relative group shadow-sm hover:border-black/30 transition-colors">
                                      <div className="flex justify-between items-center border-b-2 border-black/5 pb-2">
                                          <span className="text-[10px] font-black uppercase tracking-[0.2em] text-neutral-400 font-mono">Field {idx + 1}</span>
                                          <button onClick={()=>removeQuestion(q.id)} className="text-[#ff2a00] hover:bg-[#ff2a00]/10 px-3 py-1.5 text-[10px] font-black uppercase tracking-widest transition-colors font-mono opacity-0 group-hover:opacity-100">Delete</button>
                                      </div>

                                      <div className="flex flex-col gap-1.5">
                                          <span className="text-[9px] font-black uppercase tracking-widest text-neutral-500 font-mono">Question Label</span>
                                          <input className="w-full bg-neutral-50 border-2 border-black/10 p-3 text-xs font-bold outline-none focus:border-black font-mono transition-colors" value={q.label} onChange={e=>updateQuestion(q.id, 'label', e.target.value)} />
                                      </div>

                                      <div className="grid grid-cols-3 gap-3">
                                         <div className="col-span-2 flex flex-col gap-1.5">
                                             <span className="text-[9px] font-black uppercase tracking-widest text-neutral-500 font-mono">Input Type</span>
                                             <select className="bg-neutral-50 border-2 border-black/10 p-3 text-xs font-bold outline-none focus:border-black font-mono uppercase cursor-pointer transition-colors" value={q.type} onChange={e=>updateQuestion(q.id, 'type', e.target.value)}>
                                                <option value="text">Short Text</option>
                                                <option value="textarea">Long Text</option>
                                                <option value="email">Email</option>
                                                <option value="url">Link / URL</option>
                                                <option value="radio">Radio Choice</option>
                                                <option value="checkbox">Checkbox</option>
                                                <option value="select">Dropdown</option>
                                             </select>
                                         </div>
                                         <div className="col-span-1 flex flex-col gap-1.5">
                                             <span className="text-[9px] font-black uppercase tracking-widest text-neutral-500 font-mono">Required</span>
                                             <button onClick={()=>updateQuestion(q.id, 'required', !q.required)} className={`h-full p-3 text-xs font-black border-2 transition-all flex items-center justify-center tracking-widest ${q.required ? 'bg-black text-white border-black shadow-sm' : 'bg-white text-black opacity-40 border-black/20 hover:opacity-100 hover:border-black'}`}>REQ {q.required ? '✓' : ''}</button>
                                         </div>
                                      </div>

                                      {['radio', 'checkbox', 'select'].includes(q.type) && (
                                         <div className="flex flex-col gap-1.5 bg-neutral-50 p-3 border-2 border-black/5">
                                             <span className="text-[9px] font-black uppercase tracking-widest text-neutral-500 font-mono">Options (Comma separated)</span>
                                             <input className="bg-white border-2 border-black/10 p-2.5 text-xs font-mono outline-none focus:border-black" placeholder="Option 1, Option 2..." value={(q.options || []).join(', ')} onChange={e=>updateQuestion(q.id, 'options', e.target.value.split(',').map(s=>s.trim()))} />
                                         </div>
                                      )}

                                      <div className="flex flex-col gap-1.5 pt-2 border-t-2 border-black/5 mt-1">
                                          <span className="text-[9px] font-black uppercase tracking-widest text-blue-600 font-mono">Google Form entry.ID</span>
                                          <input className="bg-blue-50/50 border-2 border-blue-200/60 p-3 text-xs font-mono outline-none focus:border-blue-500 text-blue-900 font-bold tracking-wider" placeholder="entry.123456" value={q.googleId || ''} onChange={e=>updateQuestion(q.id, 'googleId', e.target.value)} />
                                      </div>
                                   </div>
                                ))}
                            </div>
                            <button onClick={addQuestion} className="w-full py-5 border-2 border-dashed border-black/20 bg-neutral-50 hover:bg-black hover:text-white transition-all font-black text-[11px] uppercase tracking-[0.2em] font-mono mt-2">+ Add Custom Field</button>
                        </SectionGroup>
                      </>
                    )}
                </div>
            ) : activeEditorMenu === 'mapper' ? (
                <div className="flex flex-col gap-6 animate-in slide-in-from-left-4">
                    <button onClick={()=>setActiveEditorMenu('main')} className="text-[10px] font-black opacity-40 uppercase tracking-widest hover:opacity-100 transition-opacity text-left">← BACK TO MENU</button>

                    <SectionGroup title="Form Mapping Data">
                        <p className="text-[10px] font-mono opacity-60 leading-relaxed">Paste your Google Form URL here to automatically extract and map your questions. (If automatic fetch fails due to security, you can also paste the raw 'Page Source' HTML here!)</p>
                        <textarea
                          value={prefillUrl}
                          onChange={(e)=>setPrefillUrl(e.target.value)}
                          placeholder="https://docs.google.com/forms/..."
                          className="w-full h-20 p-4 text-xs border-2 border-black/10 bg-neutral-50 rounded-none outline-none focus:border-black custom-scrollbar font-mono break-all transition-colors"
                        />
                        <button
                          onClick={handleAutoMapForm}
                          disabled={isMappingLoading}
                          className="py-4 bg-[#ff2a00] hover:bg-red-700 text-white text-[10px] font-black rounded-none uppercase tracking-[0.2em] transition-colors border-2 border-[#ff2a00] shadow-md"
                        >
                          {isMappingLoading ? 'Mapping Form...' : 'Auto-Map Form'}
                        </button>
                    </SectionGroup>
                </div>
            ) : (
                <div className="flex flex-col gap-4 animate-in slide-in-from-left-4">
                    <button onClick={()=>setActiveEditorMenu('main')} className="text-[10px] font-black opacity-40 uppercase tracking-widest hover:opacity-100 transition-opacity text-left mb-2">← BACK TO MENU</button>
                    <button onClick={() => handleExportImage(false)} className="py-5 bg-white border-2 border-black/10 rounded-none text-[11px] font-black uppercase tracking-[0.2em] hover:border-black transition-colors text-inherit">Raw Render (PNG)</button>
                    <button onClick={() => handleExportImage(true)} className="py-5 bg-black text-white border-2 border-black rounded-none text-[11px] font-black uppercase tracking-[0.2em] shadow-lg hover:bg-neutral-800 transition-colors">Poster Layout (PNG)</button>
                    <button onClick={handleStartVideoRecording} disabled={isRecording} className={`py-5 text-white border-2 rounded-none text-[11px] font-black uppercase tracking-[0.2em] shadow-lg transition-colors ${isRecording ? 'bg-red-800 border-red-800' : 'bg-[#ff2a00] border-[#ff2a00] hover:bg-red-700'}`}>{isRecording ? 'Recording Scene (Wait)' : 'Record Poster Reel (WEBM)'}</button>
                    <button onClick={handleDownloadWebsiteBuild} className="py-5 bg-blue-600 text-white border-2 border-blue-600 rounded-none text-[11px] font-black uppercase tracking-[0.2em] shadow-lg hover:bg-blue-700 transition-colors mt-4">Download Source (HTML)</button>
                </div>
            )}
          </div>
          <div className="p-6 bg-white border-t-2 border-black/10 flex gap-2">
              <button onClick={handleSaveSettings} className="flex-1 py-5 bg-black text-white text-[11px] font-black rounded-none uppercase tracking-[0.2em] w-full hover:bg-neutral-800 transition-colors border-2 border-black shadow-[4px_4px_0px_rgba(0,0,0,0.2)] active:translate-y-1 active:translate-x-1 active:shadow-none">
                  {isSaved ? 'CONFIG SAVED ✓' : 'SAVE CONFIGURATION'}
              </button>
          </div>
        </div>
      )}

      {/* EXPORT OVERLAY */}
      {exportedImage && (
        <div className="absolute inset-0 z-[200] bg-neutral-900/95 flex flex-col items-center justify-center p-8 animate-in fade-in duration-300">
            <button onClick={()=>setExportedImage(null)} className="absolute top-8 right-8 text-white font-bold opacity-50 hover:opacity-100 transition-opacity">CLOSE [X]</button>
            <button onClick={handleDownloadImage} className="mb-6 px-12 py-4 bg-white text-black font-black uppercase tracking-[0.2em] rounded-none shadow-2xl hover:bg-neutral-200 transition-colors border-2 border-white">SAVE PNG</button>
            <img src={exportedImage} className="max-h-[70vh] rounded-none shadow-2xl border-2 border-white/20" />
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
