<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WCC - Open Call & Talks Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Space+Grotesk:wght@300;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="bg-[#0a0a0a] overflow-hidden m-0 p-0 text-white selection:bg-white selection:text-black font-sans">

  <div id="root"></div>

  <script type="text/babel" id="app-source">
const { useState, useEffect, useRef } = React;

const DEFAULT_SETTINGS = {
  exportWidth: 1080, exportHeight: 1350, videoDuration: 5.0,
  artPosX: 0.0, artPosY: 1.6, artZoom: 0.0,
  archShape: 'torus_half', coreShape: 'icosahedron', catalystShape: 'tetrahedron', ringShape: 'thin',
  mediaGallery: ['https://lh3.googleusercontent.com/d/12eRDfhxcSlHPO5STUEe1sGw7lD7T31JL'],
  mediaStyle: 'floating', imageOffsetX: 0.5, imageOffsetY: 0.5, imageScale: 1.0,
  bgColor: '#0a0a0a', archColor: '#333333', ringColor: '#888888', cubeColor: '#ff2a00', glassColor: '#ffffff',
  glassIor: 1.6, archScale: 1.0, ringScale: 1.0, cubeScale: 1.0, glassScale: 1.0, uiAccentColor: '#ff2a00', uiFont: "'Space Grotesk', sans-serif",
  contentHero: 'WCC:', contentSub: 'Women Creating Change', btnEnter: 'Enter the Lab', contentTag: 'Բաց կանչ/Open call',
  contentTitle: 'WCC: Women Creating Change',
  contentIntro1: '3-ամսյա ինտենսիվ ստեղծագործական լաբորատորիա\nԱշխատարաններ / Բաց քննարկումներ / Մենթորինգ / Առցանց ցուցահանդես',
  contentIntro2: 'A 3-month intensive creative lab\nWorkshops / Talks / Mentorship / Virtual Exhibition',
  contentDesc1: 'WCC-ն հայտարարում է բաց կանչ՝ 3-ամսյա ստեղծագործական լաբորատոր ծրագրի համար, որը տեղի կունենա Գյումրիում և առցանց։',
  contentDesc2: 'WCC announces an open call for a 3-month creative lab program on-site in Gyumri and online.',
  titleInclusions: 'Programme / Ծրագիր:', inclusion1: 'Աշխատարաններ / Workshops', inclusion2: 'Բաց քննարկումներ / Talks', inclusion3: 'Մենթորինգ / Mentorship', inclusion4: 'Առցանց ցուցահանդես / Virtual Exhibition',
  titleDeadline: 'Application Deadline', contentDeadline: 'Ապրիլի 12, 2026 / April 12, 2026',
  talkTag: 'Guest Speaker / Հյուր Բանախոս', talkTitle: 'Tatev Hovakimyan', talkSubtitle: 'Theater & Cinema Actress', talkDetails: 'April 15 | 16:00\nGyumri',
  useInternalForm: true, applyLink: 'https://docs.google.com/forms/', webhookUrl: '',
  formTitle: 'Apply', formSuccessTitle: 'Application Received', formSuccessMsg: 'Thank you.',
  questions: [
    { id: 'q1', label: 'Անուն, ազգանուն / Name, Surname', type: 'text', required: true, googleId: 'entry.1' },
    { id: 'q5', label: 'Էլ․ հասցե / Email', type: 'email', required: true, googleId: 'entry.5' }
  ]
};

// --- GEOMETRY FACTORIES ---
const createArchGeo = (type) => {
  if (type === 'none') return new THREE.BoxGeometry(0,0,0);
  switch(type) {
    case 'torus_full': return new THREE.TorusGeometry(2.4, 0.35, 32, 100);
    case 'cylinder': return new THREE.CylinderGeometry(2.4, 2.4, 0.7, 64);
    case 'box': return new THREE.BoxGeometry(4.8, 0.7, 4.8);
    case 'wireframe_torus': return new THREE.TorusGeometry(3, 0.4, 16, 64);
    case 'torus_half': default: return new THREE.TorusGeometry(2.4, 0.35, 32, 100, Math.PI * 1.5);
  }
};
const createCoreGeo = (type) => {
  if (type === 'none') return new THREE.BoxGeometry(0,0,0);
  switch(type) {
    case 'box': return new THREE.BoxGeometry(1.8, 1.8, 1.8);
    case 'icosahedron': return new THREE.IcosahedronGeometry(1.2, 0);
    case 'sphere': default: return new THREE.SphereGeometry(1.2, 64, 64);
  }
};
const createRingGeo = (type, radius) => {
  const thick = 0.02;
  if (type === 'none') return new THREE.BoxGeometry(0,0,0);
  switch(type) {
    case 'thick': return new THREE.TorusGeometry(radius, 0.08, 16, 100);
    case 'square': return new THREE.TorusGeometry(radius, 0.06, 4, 100);
    case 'orbit_rings': return new THREE.TorusGeometry(radius, 0.005, 8, 100);
    case 'thin': default: return new THREE.TorusGeometry(radius, thick, 16, 100);
  }
};

function App() {
  const mountRef = useRef(null);
  const sceneRefs = useRef({});
  const [layer, setLayer] = useState(0);
  const [formAnswers, setFormAnswers] = useState({});
  const [formStatus, setFormStatus] = useState('idle');
  const targetArtPosRef = useRef({ x: 0, y: 0.5, z: 8.0 });

  const settings = DEFAULT_SETTINGS;
  const settingsRef = useRef(settings);
  settingsRef.current = settings;

  const handleFormSubmit = () => {
    for (const q of settings.questions) {
        if (q.required) {
            const val = formAnswers[q.id];
            if (!val || (Array.isArray(val) && val.length === 0) || (typeof val === 'string' && val.trim() === '')) {
                alert(`Please answer the required question: [ ${q.label} ]`);
                return;
            }
        }
    }
    setFormStatus('submitting');

    if (settings.webhookUrl) {
        const iframeName = 'hidden_iframe_' + Date.now();
        const iframe = document.createElement('iframe');
        iframe.name = iframeName; iframe.style.display = 'none';
        document.body.appendChild(iframe);
        const form = document.createElement('form');
        form.method = 'POST'; form.action = settings.webhookUrl; form.target = iframeName;
        settings.questions.forEach(q => {
            const val = formAnswers[q.id];
            if (Array.isArray(val)) {
                val.forEach(v => {
                    const input = document.createElement('input');
                    input.type = 'hidden'; input.name = q.googleId; input.value = v; form.appendChild(input);
                });
            } else {
                const input = document.createElement('input');
                input.type = 'hidden'; input.name = q.googleId; input.value = val || ""; form.appendChild(input);
            }
        });
        document.body.appendChild(form); form.submit();
        setTimeout(() => { document.body.removeChild(form); setTimeout(() => document.body.removeChild(iframe), 2000); }, 100);
    }
    setTimeout(() => setFormStatus('success'), 1200);
  };

  useEffect(() => {
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(settings.bgColor);
    scene.fog = new THREE.FogExp2(settings.bgColor, 0.05);
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, targetArtPosRef.current.z);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    if (mountRef.current) mountRef.current.appendChild(renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffffff, 1.2));
    const dirLight = new THREE.DirectionalLight(0xffffff, 2.0); dirLight.position.set(5, 10, 5); scene.add(dirLight);

    const shelterGroup = new THREE.Group();
    const arch = new THREE.Mesh(createArchGeo(settings.archShape), new THREE.MeshStandardMaterial({ color: settings.archColor, roughness: 0.9, metalness: 0.1 }));
    arch.rotation.z = -Math.PI / 4; shelterGroup.add(arch);

    const ring = new THREE.Mesh(createRingGeo(settings.ringShape, 2.1), new THREE.MeshStandardMaterial({ color: settings.ringColor, roughness: 0.2, metalness: 0.8 }));
    shelterGroup.add(ring);

    const innerRing = new THREE.Mesh(createRingGeo(settings.ringShape, 1.6), new THREE.MeshStandardMaterial({ color: settings.ringColor, roughness: 0.1, metalness: 1.0 }));
    innerRing.rotation.x = Math.PI / 2; shelterGroup.add(innerRing);

    const cube = new THREE.Mesh(new THREE.BoxGeometry(0.6,0.6,0.6), new THREE.MeshStandardMaterial({ color: settings.cubeColor, roughness: 0.2, metalness: 0.1 }));
    cube.position.set(1.5, 1.5, 1.5); shelterGroup.add(cube);

    const innerMesh = new THREE.Mesh(createCoreGeo(settings.coreShape), new THREE.MeshPhysicalMaterial({ color: settings.glassColor, metalness: 0.1, roughness: 0.05, transmission: 1.0, ior: settings.glassIor, thickness: 2.0, transparent: true }));
    shelterGroup.add(innerMesh);

    const galleryGroup = new THREE.Group();
    shelterGroup.add(galleryGroup);

    scene.add(shelterGroup);

    sceneRefs.current = {
        scene, camera, renderer, arch, ring, innerRing, cube, innerMesh, shelterGroup, galleryGroup,
        currentShapes: { arch: settings.archShape, core: settings.coreShape, ring: settings.ringShape },
        currentGallery: [], currentMediaStyle: "", currentTextures: []
    };

    const handleResize = () => {
      camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
    };
    window.addEventListener('resize', handleResize);

    let animationFrameId; let time = 0;
    const animate = () => {
      animationFrameId = requestAnimationFrame(animate);
      const s = settingsRef.current;

      time += 16.66; arch.rotation.x += 0.002; cube.rotation.x -= 0.005;
      if(s.mediaGallery?.length > 0 && s.mediaStyle === 'floating') {
          galleryGroup.rotation.y = Math.sin(time * 0.0005) * 0.15;
          galleryGroup.rotation.x = Math.sin(time * 0.0003) * 0.05;
      }

      shelterGroup.position.x += ((targetArtPosRef.current.x + s.artPosX) - shelterGroup.position.x) * 0.05;
      shelterGroup.position.y += ((targetArtPosRef.current.y + s.artPosY + Math.sin(time * 0.0005) * 0.1) - shelterGroup.position.y) * 0.05;
      innerMesh.position.y = Math.sin(time * 0.001) * 0.1; cube.position.y = 1.5 + Math.sin(time * 0.002) * 0.2;
      camera.position.z += ((targetArtPosRef.current.z + s.artZoom) - camera.position.z) * 0.05;
      camera.lookAt(0, 0, 0);

      renderer.render(scene, camera);
    };
    animate();

    return () => { window.removeEventListener('resize', handleResize); cancelAnimationFrame(animationFrameId); renderer.dispose(); };
  }, []);

  useEffect(() => {
    if (!sceneRefs.current.scene) return;
    const { scene, arch, ring, innerRing, cube, innerMesh, galleryGroup, currentShapes } = sceneRefs.current;

    if (currentShapes.arch !== settings.archShape) { arch.geometry.dispose(); arch.geometry = createArchGeo(settings.archShape); currentShapes.arch = settings.archShape; }
    if (currentShapes.core !== settings.coreShape) { innerMesh.geometry.dispose(); innerMesh.geometry = createCoreGeo(settings.coreShape); currentShapes.core = settings.coreShape; }
    if (currentShapes.ring !== settings.ringShape) {
        ring.geometry.dispose(); innerRing.geometry.dispose();
        ring.geometry = createRingGeo(settings.ringShape, 2.1); innerRing.geometry = createRingGeo(settings.ringShape, 1.6); currentShapes.ring = settings.ringShape;
    }

    if (JSON.stringify(sceneRefs.current.currentGallery) !== JSON.stringify(settings.mediaGallery) || sceneRefs.current.currentMediaStyle !== settings.mediaStyle) {
      sceneRefs.current.currentTextures.forEach(t => t.dispose());
      while(galleryGroup.children.length > 0) {
          const child = galleryGroup.children[0];
          child.traverse((c) => { if (c.geometry) c.geometry.dispose(); if (c.material) { if (c.material.map) c.material.map.dispose(); c.material.dispose(); } });
          galleryGroup.remove(child);
      }
      sceneRefs.current.currentTextures = []; sceneRefs.current.currentGallery = [...(settings.mediaGallery || [])]; sceneRefs.current.currentMediaStyle = settings.mediaStyle;

      if (settings.mediaGallery && settings.mediaGallery.length > 0) {
        const loader = new THREE.TextureLoader(); loader.setCrossOrigin('anonymous');
        settings.mediaGallery.forEach((url, i) => {
            loader.load(url, (texture) => {
              texture.colorSpace = THREE.SRGBColorSpace; sceneRefs.current.currentTextures.push(texture);
              if (settings.mediaStyle === 'floating') {
                 innerMesh.material.map = null; innerMesh.material.transmission = 1.0;
                 const size = 3.2;
                 const clonedTexture = texture.clone(); clonedTexture.needsUpdate = true; clonedTexture.matrixAutoUpdate = false;
                 const imageAspect = texture.image.width / texture.image.height;
                 const baseSx = imageAspect > 1.0 ? 1.0 / imageAspect : 1.0; const baseSy = imageAspect > 1.0 ? 1.0 : imageAspect;
                 const finalSx = baseSx / (settings.imageScale || 1.0); const finalSy = baseSy / (settings.imageScale || 1.0);
                 const tx = (1.0 - finalSx) * (settings.imageOffsetX ?? 0.5); const ty = (1.0 - finalSy) * (1.0 - (settings.imageOffsetY ?? 0.5));
                 clonedTexture.matrix.setUvTransform(tx, ty, finalSx, finalSy, 0, 0, 0);

                 const canvasGroup = new THREE.Group();
                 const canvasMesh = new THREE.Mesh(new THREE.BoxGeometry(size, size, 0.05), new THREE.MeshStandardMaterial({ map: clonedTexture, color: 0xffffff, roughness: 0.2, metalness: 0.1 }));
                 const frameMesh = new THREE.Mesh(new THREE.BoxGeometry(size + 0.1, size + 0.1, 0.02), new THREE.MeshStandardMaterial({ color: settings.archColor, roughness: 0.9, metalness: 0.1 }));
                 frameMesh.position.z = -0.02; canvasGroup.add(canvasMesh); canvasGroup.add(frameMesh);
                 const count = settings.mediaGallery.length; const spacing = count > 1 ? 2.8 : 0; const offset = i - (count - 1) / 2;
                 canvasGroup.position.x = offset * spacing; canvasGroup.position.z = Math.abs(offset) * 0.8; canvasGroup.rotation.y = -offset * 0.2;
                 galleryGroup.add(canvasGroup);
              } else {
                 if (i === 0) { innerMesh.material.map = texture; innerMesh.material.transmission = 0.0; }
              }
              innerMesh.material.needsUpdate = true;
            });
        });
      } else {
        innerMesh.material.map = null; innerMesh.material.transmission = 1.0; innerMesh.material.needsUpdate = true;
      }
    }

    scene.background.set(settings.bgColor); scene.fog.color.set(settings.bgColor);
    arch.material.color.set(settings.archColor); cube.material.color.set(settings.cubeColor);
    ring.material.color.set(settings.ringColor); innerRing.material.color.set(settings.ringColor);
    innerMesh.material.color.set(settings.glassColor);
    arch.scale.setScalar(settings.archScale); ring.scale.setScalar(settings.ringScale); innerRing.scale.setScalar(settings.ringScale);
    cube.scale.setScalar(settings.cubeScale); innerMesh.scale.setScalar(settings.glassScale);
  }, [settings]);

  return (
    <div className="relative w-full h-screen overflow-hidden text-white bg-[#0a0a0a]" style={{ fontFamily: settings.uiFont }}>
      <style>{`
        .bg-grid { background-size: 40px 40px; background-image: linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px), linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px); }
        .ui-btn-solid { background: ${settings.uiAccentColor}; color: white; border-radius: 0; padding: 16px 32px; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; border: 2px solid transparent; transition: all 0.2s; }
        .ui-btn-solid:hover { background: white; color: ${settings.uiAccentColor}; border-color: ${settings.uiAccentColor}; }
        .public-form-input { background: rgba(0,0,0,0.02); border: 2px solid rgba(0,0,0,0.1); border-radius: 0; padding: 14px; font-size: 14px; outline: none; transition: all 0.2s; color: black !important; font-family: 'JetBrains Mono', monospace; }
        .public-form-input:focus { background: white; border-color: ${settings.uiAccentColor}; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 0px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }
      `}</style>

      <div className="absolute inset-0 z-0 bg-grid opacity-50 pointer-events-none" />
      <div ref={mountRef} className="absolute inset-0 z-0" />

      {/* LAYER 0: HERO */}
      <div className={`absolute inset-0 z-10 flex flex-col p-6 md:p-12 transition-all duration-1000 overflow-y-auto custom-scrollbar ${layer === 0 ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>
        <div className="flex-1 flex flex-col items-center justify-center text-center mix-blend-difference text-white z-10 w-full min-h-[50vh]">
          <h1 className="text-6xl md:text-[10rem] font-black mb-2 uppercase tracking-tighter leading-none">{settings.contentHero}</h1>
          <h2 className="text-sm md:text-3xl font-bold tracking-[0.3em] uppercase opacity-90 mt-4 font-mono">{settings.contentSub}</h2>
          <button onClick={() => setLayer(1)} className="mt-8 md:mt-16 px-8 md:px-16 py-4 md:py-5 bg-white text-black font-black uppercase tracking-[0.2em] hover:bg-neutral-200 transition-colors border-2 border-transparent hover:border-black">[{settings.btnEnter}]</button>
        </div>

        <div className="w-full md:w-[420px] self-center md:self-end mt-8 bg-[#0a0a0a]/90 backdrop-blur-md border border-white/20 group hover:border-[#ff2a00]/80 transition-colors z-20 text-left relative shrink-0 shadow-2xl flex flex-col">
            <div className="absolute top-0 right-0 bg-[#ff2a00] text-white text-[8px] font-black tracking-widest px-3 py-1 uppercase z-10">Upcoming Event</div>
            {settings.mediaGallery && settings.mediaGallery[0] && (
              <div className="w-full h-48 overflow-hidden relative border-b border-white/10 flex items-center justify-center bg-black">
                <img src={settings.mediaGallery[0]} crossOrigin="anonymous" className="opacity-70 group-hover:opacity-100 transition-opacity" style={{ width: '100%', height: '100%', objectFit: 'cover', objectPosition: `${(settings.imageOffsetX ?? 0.5) * 100}% ${(settings.imageOffsetY ?? 0.5) * 100}%`, transform: `scale(${settings.imageScale || 1.0})` }} alt="Speaker" />
                <div className="absolute inset-0 bg-gradient-to-t from-[#0a0a0a] to-transparent pointer-events-none" />
              </div>
            )}
            <div className="p-6 pt-4">
              <p className="text-[10px] font-black uppercase text-[#ff2a00] tracking-[0.2em] font-mono mb-2">{settings.talkTag}</p>
              <h3 className="text-2xl font-black uppercase tracking-tighter mb-1">{settings.talkTitle}</h3>
              <p className="text-xs font-bold opacity-80 mb-4 font-serif italic">{settings.talkSubtitle}</p>
              <p className="text-[10px] font-mono uppercase whitespace-pre-wrap text-white/60 leading-loose border-l-2 border-[#ff2a00] pl-3">{settings.talkDetails}</p>
            </div>
        </div>
      </div>

      {/* LAYERS 1-3: PUBLIC UI */}
      {layer > 0 && (
          <div className="absolute inset-0 z-10 flex items-center justify-center md:justify-end p-4 md:p-12 transition-all duration-1000">
              <div className="max-w-xl w-full bg-white/95 backdrop-blur-md border border-black/10 shadow-[16px_16px_0px_rgba(0,0,0,0.1)] p-8 md:p-12 overflow-y-auto max-h-[90vh] custom-scrollbar text-neutral-900">
                  {layer === 1 && (
                      <div className="animate-in fade-in slide-in-from-right-4 duration-500">
                        <div className="border-b-2 border-black/10 pb-4 mb-6"><p className="text-[10px] font-black uppercase text-[#ff2a00] tracking-[0.2em] font-mono">{settings.contentTag}</p></div>
                        <h2 className="text-4xl md:text-5xl font-black mb-6 leading-tight tracking-tighter uppercase text-black">{settings.contentTitle}</h2>
                        <div className="mb-8 space-y-4 text-sm font-bold opacity-90 border-l-4 border-[#ff2a00] pl-4 font-mono text-black">
                            <p className="whitespace-pre-wrap leading-relaxed">{settings.contentIntro1}</p>
                            <p className="whitespace-pre-wrap leading-relaxed">{settings.contentIntro2}</p>
                        </div>
                        <div className="space-y-6 opacity-80 leading-relaxed mb-8 text-base font-medium font-serif border-l-2 border-black/20 pl-6 text-black">
                            <p className="whitespace-pre-wrap">{settings.contentDesc1}</p>
                            <p className="whitespace-pre-wrap">{settings.contentDesc2}</p>
                        </div>
                        <div className="flex gap-4 pt-6 border-t-2 border-black/10">
                            <button onClick={()=>setLayer(0)} className="px-6 font-bold uppercase text-xs opacity-40 hover:opacity-100 font-mono transition-opacity text-black">Abort</button>
                            <button onClick={()=>setLayer(2)} className="flex-1 ui-btn-solid">Continue</button>
                        </div>
                      </div>
                  )}
                  {layer === 2 && (
                    <div className="animate-in fade-in slide-in-from-right-4 duration-500">
                      <h2 className="text-3xl font-black mb-8 uppercase tracking-tighter border-b-2 border-black/10 pb-4 text-black">{settings.titleInclusions}</h2>
                      <ul className="space-y-3 mb-10 text-sm md:text-base font-bold uppercase font-mono text-black">
                        {[settings.inclusion1, settings.inclusion2, settings.inclusion3, settings.inclusion4].map((item, i) => (
                            <li key={i} className="flex items-center gap-4 p-4 border border-black/10 hover:border-black/30 transition-colors bg-black/5">
                                <div className="w-3 h-3 bg-[#ff2a00]" /><span>{item}</span>
                            </li>
                        ))}
                      </ul>
                      <div className="mb-10 p-6 border-2 border-[#ff2a00] bg-[#ff2a00]/10 font-black text-2xl tracking-tight flex flex-col text-black">
                          <span className="text-[10px] text-[#ff2a00] tracking-widest uppercase mb-1 font-mono">DEADLINE</span>{settings.contentDeadline}
                      </div>
                      <div className="flex gap-4">
                          <button onClick={()=>setLayer(1)} className="px-6 font-bold uppercase text-xs opacity-40 hover:opacity-100 font-mono transition-opacity text-black">Back</button>
                          <button onClick={()=>setLayer(3)} className="flex-1 ui-btn-solid">Proceed To Form</button>
                      </div>
                    </div>
                  )}
                  {layer === 3 && (
                    <div className="animate-in fade-in slide-in-from-right-4 duration-500 text-inherit">
                       {formStatus === 'success' ? (
                          <div className="text-center py-16 border border-black/10 bg-black/5">
                              <h2 className="text-4xl font-black mb-4 uppercase tracking-tighter text-[#ff2a00]">{settings.formSuccessTitle}</h2>
                              <p className="opacity-60 mb-10 font-mono uppercase text-sm font-bold text-black">{settings.formSuccessMsg}</p>
                              <button onClick={()=>{setLayer(0); setFormStatus('idle'); setFormAnswers({});}} className="ui-btn-solid w-3/4 mx-auto block">Reset System</button>
                          </div>
                       ) : (
                          <div className="flex flex-col gap-6">
                            <div className="border-b-2 border-black/10 pb-6 mb-2"><h2 className="text-3xl font-black uppercase tracking-tighter text-black">{settings.formTitle}</h2></div>
                            {settings.useInternalForm ? (
                               <form className="flex flex-col gap-6" onSubmit={(e) => { e.preventDefault(); handleFormSubmit(); }}>
                                  {settings.questions.map((q) => (
                                    <div key={q.id} className="flex flex-col gap-2">
                                       <div className="flex justify-between items-center px-1"><label className="text-[10px] font-bold opacity-60 uppercase tracking-[0.1em] font-mono text-black">[{q.label}] {q.required && <span className="text-[#ff2a00]">*</span>}</label></div>
                                       {q.type === 'textarea' ? (<textarea className="public-form-input min-h-[140px]" required={q.required} value={formAnswers[q.id] || ''} onChange={e=>setFormAnswers({...formAnswers, [q.id]: e.target.value})} />) : q.type === 'radio' ? (<div className="flex flex-col gap-2 p-2">{q.options?.map(opt => (<label key={opt} className="flex items-center gap-3 text-sm font-mono cursor-pointer opacity-80 hover:opacity-100 text-black"><input type="radio" name={q.id} value={opt} checked={formAnswers[q.id] === opt} onChange={e => setFormAnswers({...formAnswers, [q.id]: e.target.value})} required={q.required} className="w-4 h-4 accent-[#ff2a00]" />{opt}</label>))}</div>) : q.type === 'checkbox' ? (<div className="flex flex-col gap-2 p-2">{q.options?.map(opt => { const isChecked = (formAnswers[q.id] || []).includes(opt); return (<label key={opt} className="flex items-center gap-3 text-sm font-mono cursor-pointer opacity-80 hover:opacity-100 text-black"><input type="checkbox" name={q.id} value={opt} checked={isChecked} onChange={e => { const current = formAnswers[q.id] || []; const updated = e.target.checked ? [...current, opt] : current.filter(x => x !== opt); setFormAnswers({...formAnswers, [q.id]: updated}); }} className="w-4 h-4 accent-[#ff2a00] rounded-none" />{opt}</label>)})}</div>) : q.type === 'select' ? (<select className="public-form-input" required={q.required} value={formAnswers[q.id] || ''} onChange={e=>setFormAnswers({...formAnswers, [q.id]: e.target.value})}><option value="">Select an option...</option>{q.options?.map(opt => <option key={opt} value={opt}>{opt}</option>)}</select>) : (<input className="public-form-input" type={q.type} required={q.required} value={formAnswers[q.id] || ''} onChange={e=>setFormAnswers({...formAnswers, [q.id]: e.target.value})} />)}
                                    </div>
                                  ))}
                                  <button type="submit" className="ui-btn-solid w-full mt-4">Transmit Data</button>
                                  <button type="button" onClick={()=>setLayer(2)} className="mt-4 font-bold uppercase text-xs opacity-40 hover:opacity-100 font-mono transition-opacity text-black">Cancel</button>
                               </form>
                            ) : (
                               <div className="flex flex-col items-center justify-center py-12 text-center border border-black/10 bg-black/5 text-black">
                                  <p className="opacity-60 mb-10 font-mono uppercase text-sm font-bold px-8">Routing to external secure portal.</p>
                                  <button onClick={()=>window.open(settings.applyLink, '_blank')} className="ui-btn-solid w-3/4 mx-auto block">Open Portal</button>
                                  <button onClick={()=>setLayer(2)} className="mt-8 font-bold uppercase text-xs opacity-40 hover:opacity-100 font-mono transition-opacity text-black">Back</button>
                               </div>
                            )}
                          </div>
                       )}
                    </div>
                  )}
              </div>
          </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
